<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="wa-screen">
      <div class="reaction-bar">
        <span class="emoji">👍</span>
        <span class="emoji">❤️</span>
        <span class="emoji">😂</span>
        <span class="emoji">😮</span>
        <span class="emoji">😢</span>
        <span class="emoji">🙏</span>

        <div class="plus">+</div>
      </div>

      <div class="chat-row">
        <div class="bubble">
          <span id="message"></span>

          <div class="meta">
            <span id="time"></span>
          </div>
        </div>
      </div>

      <div class="menu">
        <div class="menu-item">
          <span>Beri Bintang</span>
          <img src="../../assets/icons/star.svg" />
        </div>

        <div class="menu-item">
          <span>Balas</span>
          <img src="../../assets/icons/reply.svg" />
        </div>

        <div class="menu-item">
          <span>Teruskan</span>
          <img src="../../assets/icons/forward.svg" />
        </div>

        <div class="menu-item">
          <span>Salin</span>
          <img src="../../assets/icons/copy.svg" />
        </div>

        <div class="menu-item">
          <span>Laporkan</span>
          <img src="../../assets/icons/report.svg" />
        </div>

        <div class="menu-item delete">
          <span>Hapus</span>
          <img src="../../assets/icons/delete.svg" />
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
